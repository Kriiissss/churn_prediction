# MinIO: API :9000, консоль :9001. Бакет `datasets` создаётся сервисом minio-init (mc).
services:
  minio:
    image: minio/minio:latest
    container_name: churn_minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - churn_net

  minio-init:
    image: minio/mc:latest
    container_name: churn_minio_init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set myminio http://minio:9000 minioadmin minioadmin;
      mc mb myminio/datasets --ignore-existing;
      echo 'Бакет datasets готов';
      "
    networks:
      - churn_net

volumes:
  minio_data:

networks:
  churn_net:
    driver: bridge
