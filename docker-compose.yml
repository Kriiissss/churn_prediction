# MinIO: API :9000, консоль :9001. Бакеты `datasets` и `models` создаются сервисом `minio-mc` (mc).
services:
  minio:
    image: minio/minio:latest
    container_name: churn_minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - churn_net

  # Утилита mc для инициализации бакетов и ручной загрузки артефактов.
  # Держим контейнер живым, чтобы можно было выполнять docker compose exec ...
  minio-mc:
    image: minio/mc:latest
    container_name: churn_minio_mc
    depends_on:
      - minio
    volumes:
      - ./:/work
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set myminio http://minio:9000 minioadmin minioadmin;
      mc mb myminio/datasets --ignore-existing;
      mc mb myminio/models --ignore-existing;
      echo 'Бакеты datasets и models готовы';
      tail -f /dev/null;
      "
    networks:
      - churn_net

volumes:
  minio_data:

networks:
  churn_net:
    driver: bridge
