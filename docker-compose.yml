services:
  broker:
    image: redis:7-alpine
    container_name: churn_redis
    ports:
      - "6379:6379"
    networks:
      - churn_net

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: churn_api
    ports:
      - "8000:8000"
    environment:
      REDIS_URL: redis://broker:6379/0
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: datasets
      MINIO_MODELS_BUCKET: models
    depends_on:
      - broker
      - minio
    networks:
      - churn_net

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: churn_worker
    environment:
      REDIS_URL: redis://broker:6379/0
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: datasets
      MINIO_MODELS_BUCKET: models
    depends_on:
      - broker
      - minio
    networks:
      - churn_net

  minio:
    image: minio/minio:latest
    container_name: churn_minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - churn_net

  minio-mc:
    image: minio/mc:latest
    container_name: churn_minio_mc
    depends_on:
      - minio
    volumes:
      - ./:/work
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set myminio http://minio:9000 minioadmin minioadmin;
      mc mb myminio/datasets --ignore-existing;
      mc mb myminio/models --ignore-existing;
      echo 'Бакеты datasets и models готовы';
      tail -f /dev/null;
      "
    networks:
      - churn_net

volumes:
  minio_data:

networks:
  churn_net:
    driver: bridge
