name: CI/CD Language Detector

permissions:
  contents: read
  packages: write

on:
  push:
    branches: ["main", "master"]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Test
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: python -m pip install --upgrade pip poetry

      - name: Install dependencies
        run: |
          poetry config virtualenvs.create false
          poetry install --no-interaction --no-ansi

      - name: Configure DVC remote for dataset
        shell: bash
        env:
          DVC_ACCESS_KEY_ID: ${{ secrets.DVC_ACCESS_KEY_ID }}
          DVC_SECRET_ACCESS_KEY: ${{ secrets.DVC_SECRET_ACCESS_KEY }}
          DVC_ENDPOINTURL: ${{ secrets.DVC_ENDPOINTURL }}
        run: |
          if [ -z "$DVC_ACCESS_KEY_ID" ] || [ -z "$DVC_SECRET_ACCESS_KEY" ] || [ -z "$DVC_ENDPOINTURL" ]; then
            echo "DVC secrets are not configured (DVC_ACCESS_KEY_ID / DVC_SECRET_ACCESS_KEY / DVC_ENDPOINTURL)"
            exit 1
          fi
          poetry run dvc remote modify --local myremote access_key_id "$DVC_ACCESS_KEY_ID"
          poetry run dvc remote modify --local myremote secret_access_key "$DVC_SECRET_ACCESS_KEY"
          poetry run dvc remote modify myremote endpointurl "$DVC_ENDPOINTURL"

      - name: Pull dataset from DVC
        shell: bash
        run: |
          poetry run dvc pull data/corpus.dvc
          test -d data/corpus || (echo "data/corpus not found after dvc pull" && exit 1)

      - name: Ruff
        run: |
          python -m pip install --upgrade ruff
          poetry run ruff check .

      - name: Quality gate (accuracy > 0.98)
        run: |
          poetry run python scripts/quality_gate.py --corpus-root data/corpus --threshold 0.98

  train:
    name: Train + MLflow
    runs-on: self-hosted
    needs: test
    env:
      MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
      MLFLOW_EXPERIMENT_NAME: lab5_variant13_language_detector
      MLFLOW_MODEL_NAME: language_detector
      MLFLOW_MODEL_STAGE: Production
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      MLFLOW_S3_ENDPOINT_URL: ${{ secrets.MLFLOW_S3_ENDPOINT_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: python -m pip install --upgrade pip poetry

      - name: Install dependencies
        run: |
          poetry config virtualenvs.create false
          poetry install --no-interaction --no-ansi

      - name: Configure DVC remote for dataset
        shell: bash
        env:
          DVC_ACCESS_KEY_ID: ${{ secrets.DVC_ACCESS_KEY_ID }}
          DVC_SECRET_ACCESS_KEY: ${{ secrets.DVC_SECRET_ACCESS_KEY }}
          DVC_ENDPOINTURL: ${{ secrets.DVC_ENDPOINTURL }}
        run: |
          if [ -z "$DVC_ACCESS_KEY_ID" ] || [ -z "$DVC_SECRET_ACCESS_KEY" ] || [ -z "$DVC_ENDPOINTURL" ]; then
            echo "DVC secrets are not configured (DVC_ACCESS_KEY_ID / DVC_SECRET_ACCESS_KEY / DVC_ENDPOINTURL)"
            exit 1
          fi
          poetry run dvc remote modify --local myremote access_key_id "$DVC_ACCESS_KEY_ID"
          poetry run dvc remote modify --local myremote secret_access_key "$DVC_SECRET_ACCESS_KEY"
          poetry run dvc remote modify myremote endpointurl "$DVC_ENDPOINTURL"

      - name: Pull dataset from DVC
        shell: bash
        run: |
          poetry run dvc pull data/corpus.dvc
          test -d data/corpus || (echo "data/corpus not found after dvc pull" && exit 1)

      - name: Validate MLflow config
        shell: bash
        run: |
          if [ -z "$MLFLOW_TRACKING_URI" ]; then
            echo "MLFLOW_TRACKING_URI is not set"
            exit 1
          fi
          if [ -z "$AWS_ACCESS_KEY_ID" ] || [ -z "$AWS_SECRET_ACCESS_KEY" ] || [ -z "$MLFLOW_S3_ENDPOINT_URL" ]; then
            echo "MLflow artifact store env is not set (AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY / MLFLOW_S3_ENDPOINT_URL)"
            exit 1
          fi

      - name: Train and log model to MLflow
        run: |
          poetry run python scripts/train_model.py --corpus-root data/corpus --models-dir models --skip-dvc --accuracy-threshold 0.98

  build:
    name: Build + Push Images
    runs-on: self-hosted
    needs: train
    if: github.event_name != 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push api/worker images
        shell: bash
        run: |
          OWNER_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          API_IMAGE="ghcr.io/${OWNER_LOWER}/lang-api:latest"
          WORKER_IMAGE="ghcr.io/${OWNER_LOWER}/lang-worker:latest"
          docker build -f Dockerfile.api -t "$API_IMAGE" .
          docker push "$API_IMAGE"
          docker build -f Dockerfile.worker -t "$WORKER_IMAGE" .
          docker push "$WORKER_IMAGE"
